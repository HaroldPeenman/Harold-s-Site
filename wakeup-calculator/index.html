<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wake-Up Calculator</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Outfit:wght@700;800&family=Space+Grotesk:wght@600;700&family=Poppins:wght@600;700&family=Nunito:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tbh: 232;
      --tbs: 64%;
      --tbl: 39%;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; min-height: 100%;
      background: #06060f;
      overflow-x: hidden;
      cursor: default;
      user-select: none;
    }
    #root { width: 100%; min-height: 100%; position: relative; z-index: 1; }
    #stars {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const INITIAL_ROWS = [
      { id:1, label:'Set First Alarm', offsetMin:-100 },
      { id:2, label:'Out of Bed',      offsetMin: -70 },
      { id:3, label:'Out of Shower',   offsetMin: -40 },
      { id:4, label:'Out of House',    offsetMin: -30 },
      { id:5, label:'Start of Event',  offsetMin:   0 },
    ];

    // Per-hour config: color, banner border, gradients, glow
    const SLEEP_CFG = {
      8: {
        color: 'hsl(145,72%,52%)',
        border: 'rgba(42,200,120,0.38)',
        rightGrad: null,
        leftGrad:  { rx:95, ry:72, rgb:'42,200,120', a:0.22 },
        glow: { base:0.17, scale:1.22, dur:3.2, size:68 },
      },
      7: {
        color: 'hsl(137,62%,45%)',
        border: 'rgba(38,170,100,0.32)',
        rightGrad: null,
        leftGrad:  { rx:76, ry:66, rgb:'38,170,100', a:0.17 },
        glow: { base:0.12, scale:1.18, dur:3.0, size:56 },
      },
      6: {
        color: 'hsl(122,50%,40%)',
        border: 'rgba(35,145,80,0.24)',
        rightGrad: null,
        leftGrad:  { rx:58, ry:60, rgb:'35,145,80',  a:0.13 },
        glow: { base:0.08, scale:1.14, dur:2.8, size:44 },
      },
      5: {
        color: 'hsl(50,65%,33%)',
        border: 'rgba(170,148,28,0.32)',
        rightGrad: { rx:30, ry:55, rgb:'170,148,28', a:0.18 },
        leftGrad: null, glow: null,
      },
      4: {
        color: 'hsl(30,72%,36%)',
        border: 'rgba(185,110,28,0.34)',
        rightGrad: { rx:45, ry:60, rgb:'185,110,28', a:0.24 },
        leftGrad: null, glow: null,
      },
      3: {
        color: 'hsl(16,76%,38%)',
        border: 'rgba(185,72,28,0.36)',
        rightGrad: { rx:60, ry:65, rgb:'185,72,28',  a:0.29 },
        leftGrad: null, glow: null,
      },
      2: {
        color: 'hsl(5,79%,39%)',
        border: 'rgba(185,38,28,0.38)',
        rightGrad: { rx:75, ry:70, rgb:'185,38,28',  a:0.33 },
        leftGrad: null, glow: null,
      },
      1: {
        color: 'hsl(0,82%,40%)',
        border: 'rgba(200,28,20,0.42)',
        rightGrad: { rx:90, ry:75, rgb:'200,28,20',  a:0.38 },
        leftGrad: null, glow: null,
      },
    };

    function getBannerBg(sleepHours) {
      const cfg = SLEEP_CFG[sleepHours];
      const base = '#0d0d15';
      const layers = [];
      if (cfg.rightGrad) {
        const { rx, ry, rgb, a } = cfg.rightGrad;
        layers.push(`radial-gradient(ellipse ${rx}% ${ry}% at 105% 50%, rgba(${rgb},${a}) 0%, transparent 100%)`);
      }
      if (cfg.leftGrad) {
        const { rx, ry, rgb, a } = cfg.leftGrad;
        layers.push(`radial-gradient(ellipse ${rx}% ${ry}% at -5% 50%, rgba(${rgb},${a}) 0%, transparent 100%)`);
      }
      layers.push(base);
      return layers.join(', ');
    }

    function addMinutes(base, mins) {
      const [h, m] = base.split(":").map(Number);
      const total = h * 60 + m + mins;
      const hh = Math.floor(((total % 1440) + 1440) % 1440 / 60);
      const mm = ((total % 1440) + 1440) % 1440 % 60;
      return `${hh}:${mm.toString().padStart(2, "0")}`;
    }

    function fmtOffset(mins) {
      if (mins === 0) return null;
      const abs = Math.abs(mins);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      const parts = [];
      if (h) parts.push(`${h}h`);
      if (m) parts.push(`${m}m`);
      return `\u2212${parts.join("\u00a0")}`;
    }

    function to12(time24) {
      const [h, m] = time24.split(":").map(Number);
      const period = h >= 12 ? "PM" : "AM";
      const h12 = h % 12 || 12;
      return { h: h12, m: m.toString().padStart(2, "0"), period };
    }

    function CustomTimeInput({ value, displayValue, onChange, showShine }) {
      const hiddenRef = useRef(null);
      const { h, m, period } = to12(displayValue || value || "07:30");
      const openPicker = () => {
        const el = hiddenRef.current;
        if (!el) return;
        try { el.showPicker(); } catch(e) { el.focus(); }
      };
      return (
        <div className="custom-time-wrap" onClick={openPicker}>
          {showShine && <div className="border-shine" />}
          <span className="ctime-nums">{h}:{m}</span>
          <span className="ctime-period">{period}</span>
          <input
            ref={hiddenRef}
            type="time"
            step="300"
            value={value}
            onChange={onChange}
            style={{ position:'absolute', opacity:0, inset:0, cursor:'pointer', zIndex:1 }}
          />
        </div>
      );
    }

    const PALETTE = [
      { label:'red',    bg:'#9e282b', border:'#e05658', h:358, s:60, l:39 },
      { label:'orange', bg:'#a15726', border:'#e07c46', h:24,  s:62, l:39 },
      { label:'yellow', bg:'#a18826', border:'#d4ae38', h:48,  s:62, l:39 },
      { label:'green',  bg:'#26a153', border:'#40d878', h:142, s:62, l:39 },
      { label:'blue',   bg:'#2434a4', border:'#5a6ce2', h:232, s:64, l:39 },
      { label:'purple', bg:'#6826a1', border:'#9050d8', h:272, s:62, l:39 },
    ];

    function App() {
      const [clockIn, setClockIn] = useState("07:30");
      const [sleepHours, setSleepHours] = useState(8);
      const [displayClockIn, setDisplayClockIn] = useState("00:00");
      const [showShine, setShowShine] = useState(false);
      const [titleText, setTitleText] = useState("Pre-event Timeline");

      const resizeTitleLabel = (el) => {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, Math.ceil(28 * 1.22 * 2)) + 'px';
        el.scrollTop = 0;
      };
      const [rows, setRows] = useState(INITIAL_ROWS);
      const [nextId, setNextId] = useState(6);
      const [focusedLabelId, setFocusedLabelId] = useState(null);
      const [selectedRowId, setSelectedRowId] = useState(null);

      // Deselect when tapping outside any row
      React.useEffect(() => {
        const handler = (e) => {
          if (!e.target.closest?.('.row')) setSelectedRowId(null);
        };
        document.addEventListener('pointerdown', handler);
        return () => document.removeEventListener('pointerdown', handler);
      }, []);

      const handleRowTap = (e, id) => {
        if (e.target.closest('button, input, textarea')) return;
        setSelectedRowId(prev => prev === id ? null : id);
      };

      // Unified mouse+touch events for chevron hold-to-repeat
      const chevronEvents = (fn) => ({
        onMouseDown:   ()  => startHold(fn),
        onMouseUp:     stopHold,
        onMouseLeave:  stopHold,
        onTouchStart:  (e) => { e.preventDefault(); startHold(fn); },
        onTouchEnd:    stopHold,
        onTouchCancel: stopHold,
      });

      const holdRef = useRef(null);
      const startHold = (fn) => { fn(); holdRef.current = setInterval(fn, 110); };
      const stopHold  = ()   => { clearInterval(holdRef.current); holdRef.current = null; };

      const stepOffsetH = (id, dir) =>
        setRows(prev => sortMiddle(prev.map(r => {
          if (r.id !== id) return r;
          const h = Math.floor(Math.abs(r.offsetMin) / 60);
          const m = Math.abs(r.offsetMin) % 60;
          const newH = h + dir;
          if (newH < 0 || newH > 12 || (newH === 12 && m > 0)) return r;
          return {...r, offsetMin: -(newH * 60 + m)};
        }), id === prev[0].id));

      const stepOffsetM = (id, dir) =>
        setRows(prev => sortMiddle(prev.map(r => {
          if (r.id !== id) return r;
          let h = Math.floor(Math.abs(r.offsetMin) / 60);
          let m = Math.abs(r.offsetMin) % 60;
          m += dir;
          if (m >= 60) {
            if (h >= 12) return r;
            h += 1; m = 0;
          } else if (m < 0) {
            if (h <= 0) return r;
            h -= 1; m = 59;
          }
          return {...r, offsetMin: -(h * 60 + m)};
        }), id === prev[0].id));

      const resizeLabel = (el) => {
        if (!el) return;
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, Math.ceil(13 * 1.45 * 3)) + 'px';
        el.scrollTop = 0;
      };

      const getH = (offsetMin) => Math.floor(Math.abs(offsetMin) / 60);
      const getM = (offsetMin) => Math.abs(offsetMin) % 60;

      const sortMiddle = (arr, firstMoved = false) => {
        const last  = arr[arr.length - 1];
        let first   = {...arr[0]};

        // Clamp middle rows that reach/pass the last row or exceed 12h
        let middle = arr.slice(1, -1).map(r => {
          if (r.offsetMin >= last.offsetMin) return {...r, offsetMin: last.offsetMin - 1};
          if (r.offsetMin <= -720)           return {...r, offsetMin: -719};
          return r;
        });

        // Sort middle rows earliest-first (most negative first)
        middle.sort((a, b) => a.offsetMin - b.offsetMin);

        if (firstMoved) {
          // Tightest valid position for first row: must leave 1 min per middle row above last
          const minFirst = -(middle.length + 1);
          if (first.offsetMin > minFirst) first = {...first, offsetMin: minFirst};

          // Cascade-push middle rows forward (less negative) to stay after first row
          let prev = first;
          middle = middle.map(r => {
            if (r.offsetMin <= prev.offsetMin) {
              const pushed = Math.min(prev.offsetMin + 1, last.offsetMin - 1);
              prev = {offsetMin: pushed};
              return {...r, offsetMin: pushed};
            }
            prev = r;
            return r;
          });
          if (first.offsetMin < -720)            first = {...first, offsetMin: -720};
          if (first.offsetMin >= last.offsetMin) first = {...first, offsetMin: last.offsetMin - 1};
        } else {
          // Middle row was edited → backward-cascade to resolve intra-middle collisions,
          // then push first row back if it's been overtaken
          for (let i = middle.length - 2; i >= 0; i--) {
            if (middle[i].offsetMin >= middle[i + 1].offsetMin) {
              middle[i] = {...middle[i], offsetMin: middle[i + 1].offsetMin - 1};
            }
          }
          if (middle.length > 0 && first.offsetMin >= middle[0].offsetMin) {
            first = {...first, offsetMin: Math.max(middle[0].offsetMin - 1, -720)};
          }
          if (first.offsetMin >= last.offsetMin) {
            first = {...first, offsetMin: last.offsetMin - 1};
          }
          if (first.offsetMin < -720) first = {...first, offsetMin: -720};
        }

        return [first, ...middle, last];
      };

      const updateLabel = (id, label) =>
        setRows(prev => prev.map(r => r.id === id ? {...r, label} : r));

      const updateOffsetH = (id, val) =>
        setRows(prev => {
          const updated = prev.map(r => {
            if (r.id !== id) return r;
            const h = Math.min(12, Math.max(0, parseInt(val) || 0));
            const m = Math.abs(r.offsetMin) % 60;
            return {...r, offsetMin: -(h * 60 + m)};
          });
          return sortMiddle(updated, id === prev[0].id);
        });

      const updateOffsetM = (id, val) =>
        setRows(prev => {
          const updated = prev.map(r => {
            if (r.id !== id) return r;
            const h = Math.floor(Math.abs(r.offsetMin) / 60);
            const m = Math.min(59, Math.max(0, parseInt(val) || 0));
            return {...r, offsetMin: -(h * 60 + m)};
          });
          return sortMiddle(updated, id === prev[0].id);
        });

      const removeRow = (id) =>
        setRows(prev => prev.filter(r => r.id !== id));

      const addRow = () => {
        setRows(prev => {
          const numMiddle = prev.length - 2;
          // Block if adding would require first row to exceed 12 hours
          if (prev[0].offsetMin <= -(numMiddle + 2) && -(numMiddle + 2) < -720) return prev;
          return sortMiddle([
            prev[0],
            ...prev.slice(1, -1),
            { id: nextId, label: 'New Event', offsetMin: prev[0].offsetMin + 1 },
            prev[prev.length - 1],
          ], false);
        });
        setNextId(n => n + 1);
      };

      // Roll-up animation on mount
      useEffect(() => {
        const [tH, tM] = "07:30".split(":").map(Number);
        const targetMins = tH * 60 + tM; // 450 for 07:30
        const duration = 2500;
        const start = performance.now();
        let rafId;
        function animate(now) {
          const elapsed = now - start;
          const t = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - t, 3); // ease-out cubic
          const cur = Math.round(eased * targetMins);
          const h = Math.floor(cur / 60) % 24;
          const m = cur % 60;
          setDisplayClockIn(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
          if (t < 1) {
            rafId = requestAnimationFrame(animate);
          } else {
            setDisplayClockIn("07:30");
            setShowShine(true);
            setTimeout(() => setShowShine(false), 1100);
          }
        }
        rafId = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(rafId);
      }, []);

      const handleDownload = async () => {
        const zone = document.getElementById('capture-zone');
        if (!zone || !window.html2canvas) return;

        const glows    = zone.querySelectorAll('.sleep-glow');
        const addWrap  = zone.querySelector('.row-add-wrap');
        const screenshotTitle = zone.querySelector('.title-screenshot');
        const titleInput = document.querySelector('.title');
        const chevrons = zone.querySelectorAll('.row-chevron');

        glows.forEach(g => g.style.opacity = '0');
        const sleepTop   = zone.querySelector('.sleep-top');
        const sliderWrap = zone.querySelector('.sleep-slider-wrap');
        if (sleepTop)   sleepTop.style.display   = 'none';
        if (sliderWrap) sliderWrap.style.display = 'none';
        if (addWrap)    addWrap.style.display    = 'none';
        if (screenshotTitle) { screenshotTitle.textContent = titleText; screenshotTitle.style.display = '-webkit-box'; }
        if (titleInput) titleInput.style.display = 'none';

        // Hide chevrons — they're opacity:0 but take layout space, misaligning numbers
        chevrons.forEach(c => c.style.display = 'none');

        // Swap label textareas for divs — html2canvas doesn't clip textarea overflow reliably
        const labelTextareas = Array.from(zone.querySelectorAll('.row-label-input'));
        const labelSwaps = labelTextareas.map(ta => {
          const div = document.createElement('div');
          const cs  = window.getComputedStyle(ta);
          div.textContent     = ta.value;
          div.style.fontFamily    = cs.fontFamily;
          div.style.fontSize      = cs.fontSize;
          div.style.fontWeight    = cs.fontWeight;
          div.style.color         = cs.color;
          div.style.lineHeight    = cs.lineHeight;
          div.style.letterSpacing = cs.letterSpacing;
          div.style.wordBreak     = 'break-word';
          div.style.overflow      = 'hidden';
          div.style.height        = ta.offsetHeight + 'px';
          div.style.flex          = '1';
          div.style.minWidth      = '0';
          if (ta.style.marginLeft) div.style.marginLeft = ta.style.marginLeft;
          ta.parentNode.insertBefore(div, ta);
          ta.style.display = 'none';
          return { ta, div };
        });

        const computedBg = getComputedStyle(document.querySelector('.card')).backgroundColor;
        const canvas = await window.html2canvas(zone, {
          backgroundColor: computedBg, scale: 2, logging: false, useCORS: true,
        });

        // Restore everything
        glows.forEach(g => g.style.opacity = '');
        if (sleepTop)   sleepTop.style.display   = '';
        if (sliderWrap) sliderWrap.style.display = '';
        if (addWrap)    addWrap.style.display    = '';
        if (screenshotTitle) screenshotTitle.style.display = 'none';
        if (titleInput) titleInput.style.display = '';
        chevrons.forEach(c => c.style.display = '');
        labelSwaps.forEach(({ ta, div }) => { ta.style.display = ''; div.remove(); });

        canvas.toBlob(async (blob) => {
          const file = new File([blob], 'wake-up-schedule.png', { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try { await navigator.share({ files: [file], title: 'Wake-Up Schedule' }); return; }
            catch(e) { if (e.name === 'AbortError') return; }
          }
          const url = URL.createObjectURL(blob);
          window.open(url, '_blank');
        }, 'image/png');
      };

      const handleColorChange = ({ h, s, l }) => {
        const root = document.documentElement;
        root.style.setProperty('--tbh', h);
        root.style.setProperty('--tbs', s + '%');
        root.style.setProperty('--tbl', l + '%');
      };

      const handleClockInChange = (e) => {
        if (e.target.value) {
          setClockIn(e.target.value);
          setDisplayClockIn(e.target.value);
        }
      };

      const lightsOutTime = addMinutes(clockIn, rows[0].offsetMin - sleepHours * 60);
      const cfg = SLEEP_CFG[sleepHours];
      const trackColor = cfg.color;
      const bannerBg   = getBannerBg(sleepHours);

      const pct = (sleepHours - 1) / 7;
      const sliderBg = `linear-gradient(to left, #1a3028 ${Math.round((1-pct)*100)}%, ${trackColor} ${Math.round((1-pct)*100)}%)`;

      const { h: loH, m: loM, period: loPeriod } = to12(lightsOutTime);

      return (
        <div style={{
          minHeight:"100dvh", background:"transparent",
          display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
          fontFamily:"'DM Mono', monospace", padding:"24px",
        }}>
          <style>{`
            * { cursor: default !important; user-select: none !important; }
            .close-btn         { cursor: pointer !important; }
            .close-btn *       { cursor: pointer !important; }
            .sleep-slider      { cursor: pointer !important; }
            .custom-time-wrap  { cursor: pointer !important; }
            .custom-time-wrap input { cursor: pointer !important; }

            @property --trace-angle {
              syntax: '<angle>';
              initial-value: 0deg;
              inherits: false;
            }
            @keyframes border-trace {
              0%   { --trace-angle: 0deg;   opacity: 1; }
              68%  { --trace-angle: 292deg; opacity: 1; }
              100% { --trace-angle: 360deg; opacity: 0; }
            }
            .border-shine {
              position: absolute;
              inset: -1px;
              border-radius: 11px;
              background: conic-gradient(
                from var(--trace-angle),
                transparent 0deg,
                rgba(255,255,255,0.12) 10deg,
                rgba(255,255,255,0.85) 22deg,
                rgba(255,255,255,0.95) 28deg,
                rgba(255,255,255,0.6)  38deg,
                rgba(255,255,255,0.15) 50deg,
                transparent 62deg,
                transparent 360deg
              );
              -webkit-mask: linear-gradient(#fff 0 0) content-box,
                            linear-gradient(#fff 0 0);
              -webkit-mask-composite: xor;
              mask-composite: exclude;
              padding: 1px;
              pointer-events: none;
              animation: border-trace 1.05s linear forwards;
              z-index: 3;
            }

            @keyframes glow-pulse {
              0%, 100% { opacity: var(--glow-min, 0.4); transform: scale(1); }
              50%       { opacity: calc(var(--glow-min, 0.4) * 2.2); transform: scale(var(--glow-scale, 1.2)); }
            }

            .card {
              background: hsl(var(--tbh), calc(var(--tbs) - 9%), calc(var(--tbl) - 25%));
              border: 1px solid hsl(var(--tbh), calc(var(--tbs) - 5%), calc(var(--tbl) - 12%));
              border-radius: 20px;
              width: 100%;
              max-width: 380px;
              overflow: hidden;
              box-shadow: 0 0 60px hsla(calc(var(--tbh) - 1), calc(var(--tbs) + 58%), calc(var(--tbl) + 56%), 0.12), 0 24px 48px rgba(0,0,0,0.6);
            }
            .title-bar {
              padding: 9px 12px 9px 18px;
              background: linear-gradient(180deg,
                hsl(var(--tbh), var(--tbs), var(--tbl)) 0%,
                hsl(var(--tbh), calc(var(--tbs) - 1%), calc(var(--tbl) - 1%)) 100%);
              border-bottom: 1px solid hsl(var(--tbh), calc(var(--tbs) - 4%), calc(var(--tbl) + 10%));
              display: flex; align-items: center;
              justify-content: space-between; gap: 8px;
            }
            .close-btn {
              width: 26px; height: 26px; border-radius: 50%;
              background: hsl(var(--tbh), var(--tbs), calc(var(--tbl) - 11%));
              border: 1px solid hsl(calc(var(--tbh) - 1), calc(var(--tbs) + 17%), calc(var(--tbl) + 51%));
              color: hsl(calc(var(--tbh) - 1), calc(var(--tbs) + 17%), calc(var(--tbl) + 51%));
              font-size: 13px; line-height: 1;
              display: flex; align-items: center; justify-content: center;
              transition: background 0.15s, color 0.15s, border-color 0.15s;
              flex-shrink: 0; text-decoration: none;
            }
            .home-btn:hover {
              background: hsl(var(--tbh), calc(var(--tbs) - 18%), calc(var(--tbl) + 7%));
              border-color: hsl(var(--tbh), 92%, 93%);
              color: hsl(var(--tbh), 92%, 93%);
            }
            .dl-btn:hover {
              background: hsl(var(--tbh), calc(var(--tbs) - 18%), calc(var(--tbl) + 7%));
              border-color: hsl(var(--tbh), 92%, 93%);
              color: hsl(var(--tbh), 92%, 93%);
            }
            .card-header {
              padding: 16px 20px 18px 28px;

              <div className="rows-separator" />

              {/* Middle removable rows */}
              <div className="rows-middle-content">
                {rows.slice(1, -1).map(row => {
                    const { h, m, period } = to12(addMinutes(clockIn, row.offsetMin));
                    const sel = selectedRowId === row.id;
                    return (
                      <div key={row.id}
                        className={`row${sel ? ' is-selected' : ''}`}
                        onClick={e => handleRowTap(e, row.id)}>
                        <div className="row-dot" />
                        <textarea className="row-label-input" value={row.label} rows="1"
                          spellCheck={focusedLabelId === row.id}
                          ref={el => resizeLabel(el)}
                          onFocus={() => setFocusedLabelId(row.id)}
                          onBlur={() => setFocusedLabelId(null)}
                          onScroll={e => e.target.scrollTop = 0}
                          onChange={e => { updateLabel(row.id, e.target.value); resizeLabel(e.target); }} />
                        <div className="row-offset-wrap">
                          <span className="row-offset-pfx">−</span>
                          <div className="offset-spinner">
                            <button className="row-chevron" {...chevronEvents(() => stepOffsetH(row.id, 1))}>
                              <svg width="7" height="5" viewBox="0 0 7 5" fill="none"><path d="M1 4L3.5 1.5L6 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            </button>
                            <input type="number" className="row-offset-h" min="0" max="23" step="1"
                              value={getH(row.offsetMin)} onChange={e => updateOffsetH(row.id, e.target.value)} />
                            <button className="row-chevron" {...chevronEvents(() => stepOffsetH(row.id, -1))}>
                              <svg width="7" height="5" viewBox="0 0 7 5" fill="none"><path d="M1 1L3.5 3.5L6 1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            </button>
                          </div>
                          <span className="row-offset-pfx">h</span>
                          <div className="offset-spinner offset-spinner-m">
                            <button className="row-chevron" {...chevronEvents(() => stepOffsetM(row.id, 1))}>
                              <svg width="7" height="5" viewBox="0 0 7 5" fill="none"><path d="M1 4L3.5 1.5L6 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            </button>
                            <input type="number" className="row-offset-m" min="0" max="59" step="1"
                              value={getM(row.offsetMin)} onChange={e => updateOffsetM(row.id, e.target.value)} />
                            <button className="row-chevron" {...chevronEvents(() => stepOffsetM(row.id, -1))}>
                              <svg width="7" height="5" viewBox="0 0 7 5" fill="none"><path d="M1 1L3.5 3.5L6 1" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
                            </button>
                          </div>
                          <span className="row-offset-pfx">m</span>
                        </div>
                        <button className="row-remove-btn" onClick={() => removeRow(row.id)}>×</button>
                        <div className="row-time">{h}:{m}<span className="period">{period}</span></div>
                      </div>
                    );
                  })}
              </div>{/* end middle-content */}

              <div className="row-add-wrap">
                <button className="row-add-btn" onClick={addRow}>+</button>
              </div>

              <div className="rows-separator" />

              {/* Fixed last row */}
              {(() => {
                const row = rows[rows.length - 1];
                const { h, m, period } = to12(addMinutes(clockIn, row.offsetMin));
                const sel = selectedRowId === row.id;
                return (
                  <div key={row.id}
                    className={`row is-alarm${sel ? ' is-selected' : ''}`}
                    onClick={e => handleRowTap(e, row.id)}>
                    <div className="row-dot" />
                    <textarea className="row-label-input" value={row.label} rows="1"
                      spellCheck={focusedLabelId === row.id}
                      ref={el => resizeLabel(el)}
                      onFocus={() => setFocusedLabelId(row.id)}
                      onBlur={() => setFocusedLabelId(null)}
                      onScroll={e => e.target.scrollTop = 0}
                      onChange={e => { updateLabel(row.id, e.target.value); resizeLabel(e.target); }} />
                    <div className="row-time" style={{marginLeft:'auto'}}>{h}:{m}<span className="period">{period}</span></div>
                  </div>
                );
              })()}
            </div>
            </div>{/* end capture-zone */}

          </div>{/* end card */}

          {/* Color palette — detached below card */}
          <div className="color-buttons-section">
            {PALETTE.map(({ label, bg, border, h, s, l }) => (
              <button
                key={label}
                className="color-btn"
                title={label}
                style={{ background: bg, borderColor: border }}
                onClick={() => handleColorChange({ h, s, l })}
              />
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script>
    // ── Starfield ──────────────────────────────────────────
    const canvas = document.getElementById("stars");
    const ctx    = canvas.getContext("2d");

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);

    function rand(a, b) { return a + Math.random() * (b - a); }

    const STAR_COUNT  = 200;
    const DRIFT_PX    = 0.055; // px per frame rightward (very slow)

    const stars = Array.from({ length: STAR_COUNT }, () => ({
      x:    rand(0, 1),         // normalized 0-1
      y:    rand(0, 1),
      size: rand(0.35, 1.7),    // base radius px
      alpha: rand(0.3, 0.82),   // base brightness
      twinkle: null,            // { t, dur, hasRays } | null
      nextTwinkle: rand(80, 650),
    }));

    function drawStar(s) {
      const x = s.x * canvas.width;
      const y = s.y * canvas.height;
      let alpha  = s.alpha;
      let radius = s.size;
      let rayLen = 0;

      if (s.twinkle) {
        const bell = Math.sin((s.twinkle.t / s.twinkle.dur) * Math.PI); // 0→1→0
        alpha  = s.alpha + bell * (1 - s.alpha) * 0.88;
        radius = s.size  + bell * s.size * 0.55;
        if (s.twinkle.hasRays) rayLen = bell * 4.5;
      }

      ctx.save();
      ctx.globalAlpha = Math.min(alpha, 1);
      ctx.fillStyle   = "#ffffff";
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();

      if (rayLen > 0.4) {
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth   = 0.55;
        ctx.globalAlpha = Math.min(alpha * 0.55, 1);
        for (let i = 0; i < 4; i++) {
          const ang = (i / 4) * Math.PI * 2;
          const cos = Math.cos(ang), sin = Math.sin(ang);
          ctx.beginPath();
          ctx.moveTo(x + cos * radius, y + sin * radius);
          ctx.lineTo(x + cos * (radius + rayLen), y + sin * (radius + rayLen));
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function tick() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const s of stars) {
        // drift right, seamless wrap
        s.x += DRIFT_PX / canvas.width;
        if (s.x > 1) s.x -= 1;

        // twinkle state machine
        if (s.twinkle) {
          s.twinkle.t++;
          if (s.twinkle.t >= s.twinkle.dur) {
            s.twinkle = null;
            s.nextTwinkle = rand(100, 700);
          }
        } else {
          s.nextTwinkle--;
          if (s.nextTwinkle <= 0) {
            s.twinkle = {
              t: 0,
              dur: Math.round(rand(45, 95)),
              hasRays: Math.random() < 0.32,
            };
          }
        }

        drawStar(s);
      }

      requestAnimationFrame(tick);
    }

    tick();
  </script>
</body>
</html>
